let currentQ = 0;
let totalScore = 0;
let userName = '';
let userAnswers = [];

function startQuiz() {
  const nameInput = document.getElementById('name-input').value.trim();
  if (!nameInput) {
    document.getElementById('name-input').focus();
    document.getElementById('name-input').style.borderColor = '#e74c3c';
    return;
  }
  userName = nameInput;
  currentQ = 0;
  totalScore = 0;
  userAnswers = [];
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('question-screen').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-number').textContent = `質問 ${currentQ + 1} / ${questions.length}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-bar').style.width = `${(currentQ / questions.length) * 100}%`;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  if (q.type === 'multi') {
    const hint = document.createElement('p');
    hint.className = 'multi-hint';
    hint.textContent = '※ 複数選択できます';
    choicesEl.appendChild(hint);

    q.choices.forEach((c, i) => {
      const label = document.createElement('label');
      label.className = 'check-label';
      label.innerHTML = `<input type="checkbox" value="${c.score}"><span class="check-box"></span>${c.text}`;
      label.querySelector('input').addEventListener('change', function() {
        label.classList.toggle('selected', this.checked);
        label.querySelector('.check-box').textContent = this.checked ? '✓' : '';
      });
      choicesEl.appendChild(label);
    });

    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn btn-next';
    nextBtn.textContent = '次へ ▶';
    nextBtn.onclick = () => {
      const checked = choicesEl.querySelectorAll('input[type="checkbox"]:checked');
      const selectedTexts = Array.from(checked).map(cb => cb.closest('label').textContent.trim());
      const maxScore = checked.length === 0 ? 0
        : Math.max(...Array.from(checked).map(cb => parseInt(cb.value)));
      const answerText = checked.length === 0 ? '（未選択）' : selectedTexts.join('、');
      selectAnswer(maxScore, answerText);
    };
    choicesEl.appendChild(nextBtn);
  } else {
    q.choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c.text;
      btn.onclick = () => selectAnswer(c.score, c.text);
      choicesEl.appendChild(btn);
    });
  }
}

function selectAnswer(score, answerText) {
  const q = questions[currentQ];
  userAnswers.push({ q: q.text.replace(/^[\p{Emoji}\s]+/u, '').trim(), a: answerText });
  totalScore += score;
  currentQ++;
  if (currentQ < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

async function notifyDiscord(score, title, desc, tags) {
  const webhookUrl = 'https://discord.com/api/webhooks/1482736341111279749/oz6vMp1hqHDSWpbuId3FZRjy8EIO6JMB1BLbR8VVw88SQJAw1ivqNuZIiYlvNcPydkgD';
  const answersText = userAnswers.map((a, i) => `**Q${i+1}. ${a.q}**\n→ ${a.a}`).join('\n\n');
  const chunkSize = 1000;
  const answerFields = [];
  for (let i = 0; i < answersText.length; i += chunkSize) {
    answerFields.push({
      name: i === 0 ? '📋 回答内容' : '📋 回答内容（続き）',
      value: answersText.slice(i, i + chunkSize),
    });
  }
  const payload = {
    embeds: [{
      title: '💋 エロ度診断 結果通知',
      color: 0xc44569,
      fields: [
        { name: '名前', value: userName || '匿名', inline: true },
        { name: 'エロ度スコア', value: `${score} / 100点`, inline: true },
        { name: '診断タイプ', value: title, inline: false },
        { name: 'コメント', value: desc },
        { name: 'タグ', value: tags },
        ...answerFields,
      ],
      timestamp: new Date().toISOString(),
    }]
  };
  try {
    await fetch(webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
  } catch (e) {
    console.error('Discord通知失敗:', e);
  }
}

function showResult() {
  document.getElementById('question-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';

  const maxScore = questions.length * 5;
  const percent = Math.round((totalScore / maxScore) * 100);

  const result = results.find(r => totalScore >= r.min && totalScore <= r.max) || results[results.length - 1];

  document.getElementById('result-icon').textContent = result.icon;
  document.getElementById('score-display').textContent = percent;
  document.getElementById('result-title').textContent = result.title;
  document.getElementById('result-desc').textContent = result.desc;

  const tagsEl = document.getElementById('result-tags');
  tagsEl.innerHTML = '';
  result.tags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = t;
    tagsEl.appendChild(span);
  });

  setTimeout(() => {
    document.getElementById('meter-bar').style.width = percent + '%';
  }, 100);

  const tags = result.tags.join(' ');
  notifyDiscord(percent, result.title, result.desc, tags);
}

function retryQuiz() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'block';
  document.getElementById('name-input').value = '';
  document.getElementById('name-input').style.borderColor = '#f0c0d0';
}
